<template id="tmpl-field">
  <!-- stores HTML that is not rendered until cloned. Safe, reusable skeleton -->
  <div class="form-group">
    <!-- container matching CSS spacing rules -->
    <label class="form-label">
      <!-- where a field label will appear -->
      <span class="label-text"></span>
      <!-- placeholder for the label string -->
      <span class="required" style="display: none"> * </span>
      <!-- hidden star shown only for required fields -->
    </label>
    <div class="field-holder"></div>
    <!-- a placeholder where we will insert the actual <input>/<select>/<textarea> when the template is cloned -->
    <div class="helper-text" style="display: none"></div>
    <!-- optional small helper line; hidden unless used -->
  </div>
</template>

<script>
  function renderField(container, options) {
    // clone the template so we don't modify the original
    const tmpl = document.getElementById("tmpl-field");
    const node = tmpl.content.cloneNode(true);

    // set the visible label
    node.querySelector(".label-text").textContent = options.label || "";

    // show required star if needed
    if (options.required)
      node.querySelector(".required").style.display = "inline";

    // find the placeholder where the real input will go
    const holder = node.querySelector(".field-holder");

    // create the appropriate element type (input, textarea, or select)
    let input;
    if (options.type === "textarea") {
      input = document.createElement("textarea");
    } else if (options.type === "select") {
      input = document.createElement("select");
    } else {
      input = document.createElement("input");
      input.type = options.type || "text";
    }

    // set id, placeholder and other small attributes
    if (options.id) input.id = options.id; // gives the input an id to read later
    if (options.placeholder) input.placeholder = options.placeholder;
    if (options.attr && typeof options.attr === "object") {
      // small helper to set extra attributes (e.g., attr:{min:0, step:1})
      Object.keys(options.attr).forEach((k) =>
        input.setAttribute(k, options.attr[k]),
      );
    }

    // attach optional helper text
    if (options.helper) {
      const h = node.querySelector(".helper-text");
      h.style.display = "block";
      h.textContent = options.helper;
    }

    // insert the input into the template and append to the container
    holder.appendChild(input);
    container.appendChild(node);

    // return the newly created input element for further wiring
    return input;
  }
</script>
