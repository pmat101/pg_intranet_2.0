<!doctype html>
<html lang="en">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BD-01(A)</title>
    <?!= HtmlService.createHtmlOutputFromFile('sharedStyles').getContent(); ?>
    <?!= HtmlService.createHtmlOutputFromFile('sharedComponents').getContent();
    ?>
    <link rel="stylesheet" href="sharedStyles.css" />
  </head>
  <body>
    <div class="form-wrapper" onload="populateDropdowns">
      <div class="form-title">BD-01(A)</div>
      <div class="form-subtitle">
        To be filled by BD Team before offer is sent
      </div>
      <div class="form-section">
        <div class="form-group">
          <label class="form-label" for="lead-date"
            >Date of Client's Mail/ Lead Generation
            <span class="required">*</span></label
          >
          <input type="date" id="lead-date" required />
          <div class="helper-text">dd-mm-yyyy</div>
        </div>

        <h4>Name of the Form Filler</h4>
        <div class="form-row">
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="form-filler-first-name"
                >First Name</label
              >
              <input type="text" id="form-filler-first-name" />
            </div>
          </div>
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="form-filler-last-name"
                >Last Name</label
              >
              <input type="text" id="form-filler-last-name" />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="official-email"
            >Official Email ID <span class="required">*</span></label
          >
          <input type="email" id="official-email" required />
        </div>
        <h2>Customer Details</h2>
        <div class="form-group">
          <label class="form-label" for="customer-company"
            >Customer's Company Legal Name
            <span class="required">*</span></label
          >
          <input type="text" id="customer-company" required />
        </div>
        <h4>Customer Name</h4>
        <div class="form-row">
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="customer-first-name"
                >First Name</label
              >
              <input type="text" id="customer-first-name" />
            </div>
          </div>
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="customer-last-name"
                >Last Name</label
              >
              <input type="text" id="customer-last-name" />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="customer-contact"
            >Customer Contact Number <span class="required">*</span></label
          >
          <input type="tel" id="customer-contact" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="customer-email"
            >Customer Email <span class="required">*</span></label
          >
          <input type="email" id="customer-email" required />
        </div>
        <div class="form-group">
          <label class="form-label">Is it a repeat customer?</label>
          <div class="form-row">
            <div class="form-col-choice">
              <input type="radio" id="repeat-yes" name="repeat" value="yes" />
              <label for="repeat-yes">YES</label>
            </div>
            <div class="form-col-choice">
              <input type="radio" id="repeat-no" name="repeat" value="no" />
              <label for="repeat-no">NO</label>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="activity-proposed"
            >Type of Activity Proposed <span class="required">*</span></label
          >
          <input type="text" id="activity-proposed" required />
        </div>

        <h4>Proposed Project Location (Tentative)</h4>
        <div class="form-row">
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="village">Village</label>
              <input type="text" id="village" />
            </div>
            <div class="form-group">
              <label class="form-label" for="taluka">Taluka</label>
              <input type="text" id="taluka" />
            </div>
            <div class="form-group">
              <label class="form-label" for="district">District</label>
              <input type="text" id="district" />
            </div>
          </div>
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="state"
                >State/Region/Province</label
              >
              <input type="text" id="state" />
            </div>
            <div class="form-group">
              <label class="form-label" for="postal-code"
                >Postal / Zip Code</label
              >
              <input type="text" id="postal-code" />
            </div>
            <div class="form-group">
              <label class="form-label" for="country">Country</label>
              <select id="country"></select>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="st-ut"
            >ST/UT <span class="required">*</span></label
          >
          <select id="st-ut" required></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="work-type"
            >Type of Work <span class="required">*</span></label
          >
          <select id="work-type" required></select>
          <div class="helper-text">Select from Index sheet</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="sector"
            >Service Type/ Code/ NABET Sector</label
          >
          <select id="sector"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="specs"
            >Specifications <span class="required">*</span></label
          >
          <select id="specs" required></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="fin-year"
            >Financial Year <span class="required">*</span></label
          >
          <select id="fin-year" required>
            <option value="2023">2023</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
            <option value="2029">2029</option>
            <option value="2030">2030</option>
            <option value="2031">2031</option>
            <option value="2032">2032</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="pg-company"
            >Perfact group company name <span class="required">*</span></label
          >
          <select id="pg-company"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="customer-class"
            >Customer Classification <span class="required">*</span></label
          >
          <select id="customer-class" required>
            <option value="new">New Customer</option>
            <option value="existing">Existing Customer</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="lead-source"
            >Lead Source <span class="required">*</span></label
          >
          <select id="lead-source" required>
            <option value="pb">Mr. Praveen Bhargava</option>
            <option value="rb">Mrs. Rachna Bhargava</option>
            <option value="nb">Dr. Nipun Bhargava</option>
            <option value="rd">Mrs. Rachna Dogra</option>
            <option value="gmk">Mr. Muthukumaran Ganpathi Narayanan</option>
            <option value="ag">Mrs. Aarti Gupta</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="rfq"
            >Upload RFQ or Scope of Work document</label
          >
          <input type="file" id="rfq" />
        </div>
        <div class="form-group">
          <label class="form-label" for="remarks">Remarks</label>
          <textarea id="remarks"></textarea>
        </div>
      </div>
      <button class="btn-primary" onclick="submitBD01A()">Submit</button>
    </div>
    <script>
      function populateDropdowns() {
        google.script.run
          .withSuccessHandler(function (data) {
            const country = document.getElementById("country");
            data.country.forEach((c) => {
              const option = document.createElement("option");
              option.value = option.text = c;
              country.appendChild(option);
            });
            const stUt = document.getElementById("st-ut");
            data.stUt.forEach((s) => {
              const option = document.createElement("option");
              option.value = option.text = s;
              stUt.appendChild(option);
            });
            const workType = document.getElementById("work-type");
            data.workType.forEach((w) => {
              const option = document.createElement("option");
              option.value = option.text = w;
              workType.appendChild(option);
            });
            const sector = document.getElementById("sector");
            data.sector.forEach((s) => {
              const option = document.createElement("option");
              option.value = option.text = s;
              sector.appendChild(option);
            });
            const specs = document.getElementById("specs");
            data.specs.forEach((s) => {
              const option = document.createElement("option");
              option.value = option.text = s;
              specs.appendChild(option);
            });
            const pgCompany = document.getElementById("pg-company");
            data.pgCompany.forEach((p) => {
              const option = document.createElement("option");
              option.value = option.text = p;
              pgCompany.appendChild(option);
            });
          })
          .getDropdownData();
      }
      function submitBD01A() {
        const payload = {
          leadDate: document.getElementById("lead-date").value,
          formFillerFirstName: document.getElementById("form-filler-first-name")
            .value,
          formFillerLastName: document.getElementById("form-filler-last-name")
            .value,
          officialEmail: document.getElementById("official-email").value,
          customerCompany: document.getElementById("customer-company").value,
          customerFirstName: document.getElementById("customer-first-name")
            .value,
          customerLastName: document.getElementById("customer-last-name").value,
          customerContact: document.getElementById("customer-contact").value,
          customerEmail: document.getElementById("customer-email").value,
          isRepeatCustomer: document.querySelector(
            'input[name="repeat"]:checked',
          ).value,
          activityProposed: document.getElementById("activity-proposed").value,
          village: document.getElementById("village").value,
          taluka: document.getElementById("taluka").value,
          district: document.getElementById("district").value,
          state: document.getElementById("state").value,
          postalCode: document.getElementById("postal-code").value,
          country: document.getElementById("country").value,
          stUt: document.getElementById("st-ut").value,
          workType: document.getElementById("work-type").value,
          sector: document.getElementById("sector").value,
          specs: document.getElementById("specs").value,
          finYear: document.getElementById("fin-year").value,
          pgCompany: document.getElementById("pg-company").value,
          customerClass: document.getElementById("customer-class").value,
          leadSource: document.getElementById("lead-source").value,
          rfq: document.getElementById("rfq").files[0], // Assuming single file upload
          remarks: document.getElementById("remarks").value,
        };
      }
    </script>
  </body>
</html>
